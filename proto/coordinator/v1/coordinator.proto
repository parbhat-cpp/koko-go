syntax = "proto3";

package coordinator.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/parbhat-cpp/koko-go/proto/gen/coordinator/v1;coordinatorv1";

// CoordinatorConfig message defines the configuration for a coordinator, including the count of coordinators, the algorithm used, and the heartbeat interval.
message CoordinatorConfig {
  int64 count = 1;
  string algo = 2;
  google.protobuf.Duration heartbeat_interval = 3;
}

// GrantedCoordinator message represents a coordinator that has been granted resources by the scheduler, including its ID, role, queue name, and the timestamp of when it was created.
message GrantedCoordinator {
  string id = 1;
  string role = 2;
  string queue_name = 3;
  google.protobuf.Timestamp created_at = 4;
}
